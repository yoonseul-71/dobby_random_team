<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>dobby_random_team</title>

<link href="https://fonts.googleapis.com/css2?family=Nanum+Square+Round&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Nanum Square Round', Arial, sans-serif;
    background: #ffffff;
    text-align: center;
    padding: 30px;
}

h1 {
    font-size: 34px;
}

/* 버튼 */
button {
    margin: 6px;
    padding: 11px 20px;
    border: none;
    border-radius: 12px;
    background: #f2f2f2;
    cursor: pointer;
    font-size: 15px;
}

button.active {
    background: #333;
    color: white;
}

/* ⭐ 메인 버튼 (팀 섞기) */
.shuffle-btn {
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    color: white;
    font-weight: bold;
}

.shuffle-btn:hover {
    opacity: 0.9;
}

.copy-btn {
    background: #333;
    color: white;
}

/* 전체 레이아웃 */
.main {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    gap: 100px;
    margin-top: 50px;
}

/* 입력 영역 */
.input-area {
    display: flex;
    gap: 50px;
}

.section {
    text-align: center;
}

.box {
    display: block;
    width: 150px;
    margin: 6px auto;
    padding: 12px;
    border: 1px solid #ddd;
    border-radius: 12px;
    font-size: 15px;
}

/* 색 */
.blue { color: #2a7cff; font-weight: bold; }
.red { color: #ff4d4d; font-weight: bold; }

/* 결과 */
.result-box {
    background: #f5f7ff;
    padding: 30px 35px;
    border-radius: 18px;
    min-width: 260px;
}

.result-box h3 {
    margin-bottom: 18px;
    font-size: 20px;
}

.row {
    display: flex;
    justify-content: space-between;
    font-size: 19px;
    margin: 5px 0;
}
</style>
</head>

<body>

<h1>랜덤 팀 섞기</h1>

<div>
    <button id="btn5" onclick="setMode(5)">5 vs 5</button>
    <button id="btn6" onclick="setMode(6)">6 vs 6</button>
    <button class="shuffle-btn" onclick="shuffleTeams()">팀 섞기</button>
    <button class="copy-btn" onclick="copyResult()">결과 복사</button>
</div>

<div class="main">

    <!-- 입력 -->
    <div class="input-area">

        <div class="section">
            <h3 class="blue">1팀</h3>
            <div id="teamA"></div>
        </div>

        <div class="section">
            <h3 class="red">2팀</h3>
            <div id="teamB"></div>
        </div>

    </div>

    <!-- 결과 -->
    <div class="result-box">
        <h3>섞인 팀</h3>
        <div id="result"></div>
    </div>

</div>

<script>
let size = 5;
let finalText = "";

function setMode(n) {
    size = n;

    document.getElementById("btn5").classList.remove("active");
    document.getElementById("btn6").classList.remove("active");

    document.getElementById("btn" + n).classList.add("active");

    createInputs();
}

function createInputs() {
    let a = "", b = "";

    for (let i = 0; i < size; i++) {
        a += `<input class="box" id="a${i}">`;
        b += `<input class="box" id="b${i}">`;
    }

    document.getElementById("teamA").innerHTML = a;
    document.getElementById("teamB").innerHTML = b;

    document.getElementById("result").innerHTML = "";
}

function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
}

function shuffleTeams() {
    let names = [];

    for (let i = 0; i < size; i++) {
        let a = document.getElementById(`a${i}`).value.trim();
        let b = document.getElementById(`b${i}`).value.trim();

        if (!a || !b) {
            alert("모든 칸 입력!");
            return;
        }

        names.push(a, b);
    }

    shuffle(names);

    let teamA = names.slice(0, size);
    let teamB = names.slice(size);

    let html = "";
    finalText = "";

    for (let i = 0; i < size; i++) {
        html += `
        <div class="row">
            <span class="blue">${teamA[i]}</span>
            <span class="red">${teamB[i]}</span>
        </div>`;

        finalText += teamA[i] + "    " + teamB[i] + "\n";
    }

    document.getElementById("result").innerHTML = html;
}

function copyResult() {
    if (!finalText) {
        alert("먼저 섞기!");
        return;
    }

    navigator.clipboard.writeText(finalText);
    alert("복사 완료!");
}

setMode(5);
</script>

</body>
</html>
