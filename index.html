<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>dobby_random_team</title>

<link href="https://fonts.googleapis.com/css2?family=Nanum+Square+Round&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Nanum Square Round', Arial, sans-serif;
    background: #ffffff;
    text-align: center;
    padding: 30px;
}

h1 { font-size: 34px; }

/* 버튼 */
button {
    margin: 6px;
    padding: 11px 20px;
    border: none;
    border-radius: 12px;
    background: #f2f2f2;
    cursor: pointer;
    font-size: 15px;
}

button.active {
    background: #333;
    color: white;
}

/* 팀 섞기 버튼 */
.shuffle-btn {
    background: #4da6ff;
    color: white;
    font-weight: bold;
}

/* 복사 */
.copy-btn {
    background: #333;
    color: white;
}

/* ⭐ 핵심: 가운데 공백 포함 5열 구조 */
.grid {
    display: grid;
    grid-template-columns: 160px 160px 80px 160px 160px;
    justify-content: center;
    gap: 12px 30px;
    margin-top: 40px;
}

/* 제목 */
.title {
    font-weight: bold;
    margin-bottom: 5px;
}

/* 박스 */
.box, .result-box {
    width: 150px;
    padding: 12px;
    border-radius: 12px;
    font-size: 15px;
    margin: 4px 0;
}

.box {
    border: 1px solid #ddd;
}

.result-box {
    background: #f1f3f9;
}

/* 색 */
.blue { color: #2a7cff; font-weight: bold; }
.red { color: #ff4d4d; font-weight: bold; }

/* 버튼 위치 */
.btn-area {
    margin-top: 20px;
}
</style>
</head>

<body>

<h1>랜덤 팀 섞기</h1>

<div>
    <button id="btn5" onclick="setMode(5)">5 vs 5</button>
    <button id="btn6" onclick="setMode(6)">6 vs 6</button>
</div>

<!-- 제목 라인 -->
<div class="grid" id="header">
    <div class="title blue">1팀</div>
    <div class="title red">2팀</div>
    <div></div> <!-- ⭐ 가운데 공백 -->
    <div class="title blue">1팀</div>
    <div class="title red">2팀</div>
</div>

<!-- 데이터 영역 -->
<div class="grid" id="grid"></div>

<div class="btn-area">
    <button class="shuffle-btn" onclick="shuffleTeams()">팀 섞기</button>
    <button class="copy-btn" onclick="copyResult()">결과 복사</button>
</div>

<script>
let size = 5;
let finalText = "";

function setMode(n) {
    size = n;

    document.getElementById("btn5").classList.remove("active");
    document.getElementById("btn6").classList.remove("active");
    document.getElementById("btn" + n).classList.add("active");

    createGrid();
}

function createGrid() {
    let html = "";

    for (let i = 0; i < size; i++) {
        html += `<input class="box" id="a${i}">`;
        html += `<input class="box" id="b${i}">`;
        html += `<div></div>`; // ⭐ 가운데 공백
        html += `<div class="result-box" id="ra${i}"></div>`;
        html += `<div class="result-box" id="rb${i}"></div>`;
    }

    document.getElementById("grid").innerHTML = html;
}

function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
}

function shuffleTeams() {
    let names = [];

    for (let i = 0; i < size; i++) {
        let a = document.getElementById(`a${i}`).value.trim();
        let b = document.getElementById(`b${i}`).value.trim();

        if (!a || !b) {
            alert("모든 칸 입력!");
            return;
        }

        names.push(a, b);
    }

    shuffle(names);

    let teamA = names.slice(0, size);
    let teamB = names.slice(size);

    finalText = "";

    for (let i = 0; i < size; i++) {
        document.getElementById(`ra${i}`).innerHTML = `<span class="blue">${teamA[i]}</span>`;
        document.getElementById(`rb${i}`).innerHTML = `<span class="red">${teamB[i]}</span>`;

        finalText += teamA[i] + "    " + teamB[i] + "\n";
    }
}

function copyResult() {
    if (!finalText) {
        alert("먼저 섞기!");
        return;
    }

    navigator.clipboard.writeText(finalText);
    alert("복사 완료!");
}

setMode(5);
</script>

</body>
</html>
