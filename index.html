<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>dobby_random_team</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: #ffffff;
    text-align: center;
    padding: 30px;
}

/* 버튼 */
button {
    margin: 5px;
    padding: 10px 18px;
    border: none;
    border-radius: 10px;
    background: #f2f2f2;
    cursor: pointer;
}

button.active {
    background: #333;
    color: white;
}

.copy-btn {
    background: #333;
    color: white;
}

/* 영역 */
.container {
    display: flex;
    justify-content: center;
    gap: 60px;
    margin-top: 20px;
}

.section {
    text-align: center;
}

/* 입력칸 */
.box {
    display: block;
    width: 120px;
    margin: 4px auto;
    padding: 8px;
    border: 1px solid #ddd;
    border-radius: 8px;
}

/* 색 */
.blue { color: #2a7cff; font-weight: bold; }
.red { color: #ff4d4d; font-weight: bold; }

/* 결과 */
.compare {
    display: flex;
    justify-content: center;
    gap: 80px;
    margin-top: 30px;
}

.column {
    text-align: center;
}

.row {
    display: flex;
    justify-content: space-between;
    width: 180px;
    margin: 2px auto;
}
</style>
</head>
<body>

<h1>랜덤 팀 섞기</h1>

<!-- 버튼 -->
<div>
    <button id="btn5" onclick="setMode(5)">5 vs 5</button>
    <button id="btn6" onclick="setMode(6)">6 vs 6</button>
    <button onclick="shuffleTeams()">팀 섞기</button>
    <button class="copy-btn" onclick="copyResult()">결과 복사</button>
</div>

<!-- 입력 -->
<div class="container">
    <div class="section">
        <h3 class="blue">1팀</h3>
        <div id="teamA"></div>
    </div>

    <div class="section">
        <h3 class="red">2팀</h3>
        <div id="teamB"></div>
    </div>
</div>

<!-- 결과 비교 -->
<div class="compare">

    <!-- 섞기 전 -->
    <div class="column">
        <h3>섞기 전</h3>
        <div id="before"></div>
    </div>

    <!-- 섞기 후 -->
    <div class="column">
        <h3>섞기 후</h3>
        <div id="after"></div>
    </div>

</div>

<script>
let size = 5;
let finalText = "";

/* 모드 선택 */
function setMode(n) {
    size = n;

    document.getElementById("btn5").classList.remove("active");
    document.getElementById("btn6").classList.remove("active");

    document.getElementById("btn" + n).classList.add("active");

    createInputs();
}

/* 입력 생성 */
function createInputs() {
    let a = "", b = "";

    for (let i = 0; i < size; i++) {
        a += `<input class="box" id="a${i}">`;
        b += `<input class="box" id="b${i}">`;
    }

    document.getElementById("teamA").innerHTML = a;
    document.getElementById("teamB").innerHTML = b;

    document.getElementById("before").innerHTML = "";
    document.getElementById("after").innerHTML = "";
}

/* 셔플 */
function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
}

/* 팀 섞기 */
function shuffleTeams() {
    let names = [];
    let beforeHTML = "";

    for (let i = 0; i < size; i++) {
        let a = document.getElementById(`a${i}`).value.trim();
        let b = document.getElementById(`b${i}`).value.trim();

        if (!a || !b) {
            alert("모든 칸 입력!");
            return;
        }

        names.push(a, b);

        // 섞기 전 표시
        beforeHTML += `
        <div class="row">
            <span class="blue">${a}</span>
            <span class="red">${b}</span>
        </div>`;
    }

    document.getElementById("before").innerHTML = beforeHTML;

    shuffle(names);

    let teamA = names.slice(0, size);
    let teamB = names.slice(size);

    let afterHTML = "";
    finalText = "";

    for (let i = 0; i < size; i++) {
        afterHTML += `
        <div class="row">
            <span class="blue">${teamA[i]}</span>
            <span class="red">${teamB[i]}</span>
        </div>`;

        finalText += teamA[i] + "    " + teamB[i] + "\n";
    }

    document.getElementById("after").innerHTML = afterHTML;
}

/* 복사 */
function copyResult() {
    if (!finalText) {
        alert("먼저 섞기!");
        return;
    }

    navigator.clipboard.writeText(finalText);
    alert("복사 완료!");
}

/* 초기값 */
setMode(5);
</script>

</body>
</html>
