<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>dobby_random_team</title>

<link href="https://fonts.googleapis.com/css2?family=Nanum+Square+Round&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Nanum Square Round', Arial, sans-serif;
    background: #ffffff;
    text-align: center;
    padding: 30px;
}

h1 { font-size: 34px; }

button {
    margin: 6px;
    padding: 11px 20px;
    border: none;
    border-radius: 12px;
    background: #f2f2f2;
    cursor: pointer;
    font-size: 15px;
}

button.active {
    background: #333;
    color: white;
}

/* 버튼 색 */
.shuffle-btn {
    background: #1f5eff;
    color: white;
    font-weight: bold;
}

.copy-btn {
    background: #888;
    color: white;
}

/* 상단 버튼 */
.top-bar {
    display: flex;
    justify-content: center;
    gap: 8px;
}

/* 기존 구조 유지 */
.grid {
    display: grid;
    grid-template-columns: 160px 160px 80px 160px 160px;
    justify-content: center;
    gap: 12px 30px;
    margin-top: 40px;
}

.title {
    font-weight: bold;
    margin-bottom: 5px;
}

.box, .result-box {
    width: 150px;
    padding: 12px;
    border-radius: 12px;
    font-size: 15px;
    margin: 4px 0;
}

.box {
    border: 1px solid #ddd;
}

/* ⭐ 팀별 결과 색 */
.result-blue {
    background: #e3f0ff;
    color: black;
}

.result-red {
    background: #ffe4ec;
    color: black;
}

.blue { color: #2a7cff; font-weight: bold; }
.red { color: #ff4d4d; font-weight: bold; }
</style>
</head>

<body>

<h1>랜덤 팀 섞기</h1>

<div class="top-bar">
    <button id="btn5" onclick="setMode(5)">5 vs 5</button>
    <button id="btn6" onclick="setMode(6)">6 vs 6</button>

    <button class="shuffle-btn" onclick="shuffleTeams()">팀 섞기</button>
    <button class="copy-btn" onclick="copyResult()">결과 복사</button>
</div>

<div class="grid" id="header">
    <div class="title blue">1팀</div>
    <div class="title red">2팀</div>
    <div></div>
    <div class="title blue">1팀</div>
    <div class="title red">2팀</div>
</div>

<div class="grid" id="grid"></div>

<script>
let size = 5;
let finalText = "";

function setMode(n) {
    size = n;

    document.getElementById("btn5").classList.remove("active");
    document.getElementById("btn6").classList.remove("active");
    document.getElementById("btn" + n).classList.add("active");

    createGrid();
}

function createGrid() {
    let html = "";

    for (let i = 0; i < size; i++) {
        html += `<input class="box" id="a${i}">`;
        html += `<input class="box" id="b${i}">`;
        html += `<div></div>`;
        html += `<div class="result-box result-blue" id="ra${i}"></div>`;
        html += `<div class="result-box result-red" id="rb${i}"></div>`;
    }

    document.getElementById("grid").innerHTML = html;
}

function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
}

function shuffleTeams() {
    let names = [];

    for (let i = 0; i < size; i++) {
        let a = document.getElementById(`a${i}`).value.trim();
        let b = document.getElementById(`b${i}`).value.trim();

        if (!a || !b) {
            alert("모든 칸 입력!");
            return;
        }

        names.push(a, b);
    }

    shuffle(names);

    let teamA = names.slice(0, size);
    let teamB = names.slice(size);

    finalText = "";

    for (let i = 0; i < size; i++) {
        document.getElementById(`ra${i}`).innerText = teamA[i];
        document.getElementById(`rb${i}`).innerText = teamB[i];

        finalText += teamA[i] + "    " + teamB[i] + "\n";
    }
}

function copyResult() {
    if (!finalText) {
        alert("먼저 섞기!");
        return;
    }

    navigator.clipboard.writeText(finalText);
    alert("복사 완료!");
}

setMode(5);
</script>

</body>
</html>
