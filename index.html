<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>dobby_random_team</title>

<link href="https://fonts.googleapis.com/css2?family=Nanum+Square+Round&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Nanum Square Round', Arial, sans-serif;
    background: #ffffff;
    text-align: center;
    padding: 30px;
}

/* 제목 */
h1 { 
    font-size: 40px; 
    font-weight: 800;
}

button {
    margin: 6px;
    padding: 11px 20px;
    border: none;
    border-radius: 12px;
    background: #f2f2f2;
    cursor: pointer;
    font-size: 15px;
}

button.active {
    background: #333;
    color: white;
}

/* 버튼 색 */
.shuffle-btn { background: #1f5eff; color: white; font-weight: bold; }
.copy-btn { background: #888; color: white; }
.reset-btn { background: #444; color: white; }

/* 버튼 정렬 + 중앙 공간 */
.button-grid {
    display: grid;
    grid-template-columns: 160px 160px 120px 160px 160px;
    justify-content: center;
    margin-bottom: 40px; /* 🔥 버튼과 명단 사이 여백 */
}

.left-buttons {
    grid-column: 1 / 3;
    display: flex;
    justify-content: center;
    gap: 8px;
}

.right-buttons {
    grid-column: 4 / 6;
    display: flex;
    justify-content: center;
    gap: 8px;
}

/* 구조 */
.grid {
    display: grid;
    grid-template-columns: 160px 160px 80px 160px 160px;
    justify-content: center;
    gap: 12px 30px;
    margin-top: 10px;
}

.title {
    font-weight: bold;
    margin-bottom: 5px;
}

/* 입력 + 결과 */
.box, .result-box {
    width: 150px;
    padding: 12px;
    border-radius: 12px;
    font-size: 18px;
    margin: 4px 0;
    text-align: center;
}

/* 입력 기본 상태 */
.box {
    border: 1px solid #d0d0d0;
    background: #f3f3f3;
    outline: none;
}

/* 입력 중 강조 */
.box:focus {
    border: 2px solid black;
    background: #ffffff;
}

/* 결과 색 */
.result-blue {
    background: #e3f0ff;
}

.result-red {
    background: #ffe4ec;
}

.blue { color: #2a7cff; font-weight: bold; }
.red { color: #ff4d4d; font-weight: bold; }
</style>
</head>

<body>

<h1>랜덤 팀 섞기</h1>

<!-- 버튼 -->
<div class="button-grid">
    <div class="left-buttons">
        <button id="btn4" onclick="setMode(4)">4 vs 4</button>
        <button id="btn5" onclick="setMode(5)">5 vs 5</button>
        <button id="btn6" onclick="setMode(6)">6 vs 6</button>
    </div>

    <div class="right-buttons">
        <button class="shuffle-btn" onclick="shuffleTeams()">팀 섞기</button>
        <button class="copy-btn" onclick="copyResult()">결과 복사</button>
        <button class="reset-btn" onclick="resetAll()">초기화</button>
    </div>
</div>

<!-- 헤더 -->
<div class="grid" id="header">
    <div class="title blue">1팀</div>
    <div class="title red">2팀</div>
    <div></div>
    <div class="title blue">1팀</div>
    <div class="title red">2팀</div>
</div>

<div class="grid" id="grid"></div>

<script>
let size = 5;
let finalText = "";

function setMode(n) {
    size = n;

    document.getElementById("btn4").classList.remove("active");
    document.getElementById("btn5").classList.remove("active");
    document.getElementById("btn6").classList.remove("active");

    document.getElementById("btn" + n).classList.add("active");

    createGrid();
}

function createGrid() {
    let html = "";

    for (let i = 0; i < size; i++) {
        html += `<input class="box" id="a${i}">`;
        html += `<input class="box" id="b${i}">`;
        html += `<div></div>`;
        html += `<div class="result-box result-blue" id="ra${i}"></div>`;
        html += `<div class="result-box result-red" id="rb${i}"></div>`;
    }

    document.getElementById("grid").innerHTML = html;
}

function shuffleTeams() {
    finalText = "";

    for (let i = 0; i < size; i++) {
        let a = document.getElementById(`a${i}`).value.trim();
        let b = document.getElementById(`b${i}`).value.trim();

        if (!a || !b) {
            alert("모든 칸 입력!");
            return;
        }

        if (Math.random() < 0.5) {
            document.getElementById(`ra${i}`).innerText = a;
            document.getElementById(`rb${i}`).innerText = b;
            finalText += a + "    " + b + "\n";
        } else {
            document.getElementById(`ra${i}`).innerText = b;
            document.getElementById(`rb${i}`).innerText = a;
            finalText += b + "    " + a + "\n";
        }
    }
}

function copyResult() {
    if (!finalText) {
        alert("먼저 섞기!");
        return;
    }

    navigator.clipboard.writeText(finalText);
    alert("복사 완료!");
}

function resetAll() {
    finalText = "";

    for (let i = 0; i < size; i++) {
        document.getElementById(`a${i}`).value = "";
        document.getElementById(`b${i}`).value = "";
        document.getElementById(`ra${i}`).innerText = "";
        document.getElementById(`rb${i}`).innerText = "";
    }
}

setMode(5);
</script>

</body>
</html>
