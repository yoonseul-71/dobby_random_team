<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>dobby_random_team</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: #ffffff;
    color: #333;
    text-align: center;
    padding: 30px;
}

h1 {
    font-size: 30px;
    margin-bottom: 10px;
}

.controls {
    margin-bottom: 20px;
}

button {
    margin: 5px;
    padding: 10px 18px;
    border: none;
    border-radius: 10px;
    background: #f2f2f2;
    cursor: pointer;
}

button:hover {
    background: #e0e0e0;
}

.copy-btn {
    background: #333;
    color: white;
}

.container {
    display: flex;
    justify-content: center;
    gap: 60px;
    margin-top: 20px;
}

.section {
    text-align: center;
}

.box {
    width: 120px;
    padding: 8px;
    margin: 4px;
    border: 1px solid #ddd;
    border-radius: 8px;
}

.blue {
    color: #2a7cff;
    font-weight: bold;
}

.red {
    color: #ff4d4d;
    font-weight: bold;
}

.result-row {
    display: flex;
    justify-content: space-between;
    width: 220px;
    margin: 3px auto;
}

.result {
    margin-top: 20px;
    white-space: pre;
    background: #fafafa;
    padding: 15px;
    border-radius: 10px;
    display: inline-block;
}
</style>
</head>
<body>

<h1>랜덤 팀 섞기</h1>

<div class="controls">
    <button onclick="createInputs(5)">5 vs 5</button>
    <button onclick="createInputs(6)">6 vs 6</button>
    <button onclick="shuffleTeams()">팀 섞기</button>
    <button class="copy-btn" onclick="copyResult()">섞인팀 복사</button>
</div>

<div class="container">

    <!-- 입력 영역 -->
    <div class="section">
        <h3 class="blue">블루팀 입력</h3>
        <div id="teamAInputs"></div>
    </div>

    <div class="section">
        <h3 class="red">레드팀 입력</h3>
        <div id="teamBInputs"></div>
    </div>

</div>

<!-- 결과 영역 -->
<div id="result" class="result"></div>

<script>
let size = 5;
let finalText = "";

function createInputs(n) {
    size = n;
    let a = "";
    let b = "";

    for (let i = 0; i < n; i++) {
        a += `<input class="box" id="a${i}" placeholder="이름">`;
        b += `<input class="box" id="b${i}" placeholder="이름">`;
    }

    document.getElementById("teamAInputs").innerHTML = a;
    document.getElementById("teamBInputs").innerHTML = b;

    document.getElementById("result").innerHTML = "";
}

function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

function shuffleTeams() {
    let names = [];

    for (let i = 0; i < size; i++) {
        let a = document.getElementById(`a${i}`).value.trim();
        let b = document.getElementById(`b${i}`).value.trim();

        if (!a || !b) {
            alert("모든 칸을 입력하세요!");
            return;
        }

        names.push(a);
        names.push(b);
    }

    shuffle(names);

    let teamA = names.slice(0, size);
    let teamB = names.slice(size);

    let html = "";
    finalText = "";

    for (let i = 0; i < size; i++) {
        html += `
        <div class="result-row">
            <span class="blue">${teamA[i]}</span>
            <span class="red">${teamB[i]}</span>
        </div>
        `;

        finalText += teamA[i] + "    " + teamB[i] + "\n";
    }

    document.getElementById("result").innerHTML = html;
}

function copyResult() {
    if (!finalText) {
        alert("먼저 팀을 섞으세요!");
        return;
    }

    navigator.clipboard.writeText(finalText);
    alert("복사 완료!");
}

// 초기 기본 5vs5 생성
createInputs(5);
</script>

</body>
</html>
