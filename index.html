<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>dobby_random_team</title>

<link href="https://fonts.googleapis.com/css2?family=Nanum+Square+Round&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Nanum Square Round', Arial, sans-serif;
    background: #ffffff;
    text-align: center;
    padding: 30px;
}

h1 { font-size: 34px; }

/* 버튼 */
button {
    margin: 6px;
    padding: 11px 20px;
    border: none;
    border-radius: 12px;
    background: #f2f2f2;
    cursor: pointer;
    font-size: 15px;
}

button.active {
    background: #333;
    color: white;
}

/* 버튼 스타일 */
.shuffle-btn {
    background: #4da6ff;
    color: white;
    font-weight: bold;
}

.copy-btn {
    background: #333;
    color: white;
}

/* ⭐ 전체 레이아웃 */
.wrapper {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    gap: 120px; /* ⭐ 가운데 여백 크게 */
    margin-top: 40px;
}

/* 각 블록 */
.block {
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* 팀 2개 가로 */
.team-row {
    display: flex;
    gap: 50px;
}

/* 박스 */
.box, .result-box {
    width: 150px;
    padding: 12px;
    border-radius: 12px;
    font-size: 15px;
    margin: 5px 0;
}

.box {
    border: 1px solid #ddd;
}

.result-box {
    background: #f1f3f9;
}

/* 색 */
.blue { color: #2a7cff; font-weight: bold; }
.red { color: #ff4d4d; font-weight: bold; }

/* 버튼 위치 */
.btn-area {
    margin-top: 20px;
}
</style>
</head>

<body>

<h1>랜덤 팀 섞기</h1>

<div>
    <button id="btn5" onclick="setMode(5)">5 vs 5</button>
    <button id="btn6" onclick="setMode(6)">6 vs 6</button>
</div>

<div class="wrapper">

    <!-- 입력 -->
    <div class="block">

        <div class="team-row">
            <div>
                <h3 class="blue">1팀</h3>
                <div id="teamA"></div>
            </div>

            <div>
                <h3 class="red">2팀</h3>
                <div id="teamB"></div>
            </div>
        </div>

        <!-- ⭐ 섞기 버튼 위치 -->
        <div class="btn-area">
            <button class="shuffle-btn" onclick="shuffleTeams()">팀 섞기</button>
        </div>

    </div>

    <!-- 결과 -->
    <div class="block">

        <h3>섞인 팀</h3>

        <div class="team-row">
            <div>
                <h3 class="blue">1팀</h3>
                <div id="resultA"></div>
            </div>

            <div>
                <h3 class="red">2팀</h3>
                <div id="resultB"></div>
            </div>
        </div>

        <!-- ⭐ 복사 버튼 위치 -->
        <div class="btn-area">
            <button class="copy-btn" onclick="copyResult()">결과 복사</button>
        </div>

    </div>

</div>

<script>
let size = 5;
let finalText = "";

function setMode(n) {
    size = n;

    document.getElementById("btn5").classList.remove("active");
    document.getElementById("btn6").classList.remove("active");
    document.getElementById("btn" + n).classList.add("active");

    createInputs();
}

function createInputs() {
    let a = "", b = "";
    let ra = "", rb = "";

    for (let i = 0; i < size; i++) {
        a += `<input class="box" id="a${i}">`;
        b += `<input class="box" id="b${i}">`;

        ra += `<div class="result-box"></div>`;
        rb += `<div class="result-box"></div>`;
    }

    document.getElementById("teamA").innerHTML = a;
    document.getElementById("teamB").innerHTML = b;
    document.getElementById("resultA").innerHTML = ra;
    document.getElementById("resultB").innerHTML = rb;
}

function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
}

function shuffleTeams() {
    let names = [];

    for (let i = 0; i < size; i++) {
        let a = document.getElementById(`a${i}`).value.trim();
        let b = document.getElementById(`b${i}`).value.trim();

        if (!a || !b) {
            alert("모든 칸 입력!");
            return;
        }

        names.push(a, b);
    }

    shuffle(names);

    let teamA = names.slice(0, size);
    let teamB = names.slice(size);

    let htmlA = "", htmlB = "";
    finalText = "";

    for (let i = 0; i < size; i++) {
        htmlA += `<div class="result-box blue">${teamA[i]}</div>`;
        htmlB += `<div class="result-box red">${teamB[i]}</div>`;

        finalText += teamA[i] + "    " + teamB[i] + "\n";
    }

    document.getElementById("resultA").innerHTML = htmlA;
    document.getElementById("resultB").innerHTML = htmlB;
}

function copyResult() {
    if (!finalText) {
        alert("먼저 섞기!");
        return;
    }

    navigator.clipboard.writeText(finalText);
    alert("복사 완료!");
}

setMode(5);
</script>

</body>
</html>
